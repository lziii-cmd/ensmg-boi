services:
  # ── Application complète (Django + React) ───────────────────────
  - type: web
    name: ensmg-backend
    env: python
    region: oregon
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: ensmg-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "ensmg-boi-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://ensmg-boi-backend.onrender.com"
      - key: FRONTEND_URL
        value: "https://ensmg-boi-backend.onrender.com"
      - key: REDIS_URL
        sync: false
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: PYTHON_VERSION
        value: "3.11.0"

# ── Base de données PostgreSQL ───────────────────────────────────
databases:
  - name: ensmg-db
    databaseName: ensmg_boite_idees
    user: ensmg_admin
    region: oregon
    plan: free
